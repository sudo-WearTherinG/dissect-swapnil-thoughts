<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />
    <title>.: Access The Mind :.</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:," />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/sudo-WearTherinG/dissect-swapnil-thoughts@main/style-index.css"
    />
    <script
      src="https://cdn.jsdelivr.net/gh/sudo-WearTherinG/dissect-swapnil-thoughts@main/script-index.js"
      defer
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #000;
        color: #7aff9b;
        font-family: 'Share Tech Mono', monospace;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        padding: 20px;
      }

      .lock-container {
        background: #0a0a0a;
        border: 1px solid #004422;
        padding: 2.5rem;
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(0, 255, 100, 0.05);
        text-align: center;
        width: 100%;
        max-width: 400px;
        animation: flicker 1.5s infinite alternate;
      }

      h2 {
        margin-bottom: 1rem;
        font-size: 1.2rem;
        color: #4aff80;
        letter-spacing: 2px;
        transition: all 0.3s ease;
      }

      p {
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
        color: #3aff70;
      }

      input[type='password'] {
        background: transparent;
        border: 1px solid #3aff70;
        padding: 0.75rem;
        width: 100%;
        color: #00ff99;
        text-align: center;
        font-size: 1rem;
        border-radius: 4px;
        outline: none;
        caret-color: #00ff99;
        transition: border-color 0.3s ease, background-color 0.3s ease;
      }

      /* Red error style */
      input[type='password'].error {
        border-color: #ff4d4d;
        background-color: rgba(255, 77, 77, 0.1);
      }

      .submit-btn {
        margin-top: 1.5rem;
        padding: 0.5rem 2rem;
        font-size: 1rem;
        background: transparent;
        border: 1px solid #00ff88;
        color: #00ff88;
        border-radius: 4px;
        cursor: pointer;
        box-shadow: 0 0 5px #00ff88;
        transition: all 0.3s ease;
      }

      .submit-btn.processing {
        background-color: #00ff88;
        color: #000;
        box-shadow: 0 0 8px #00ff88, 0 0 15px #00ff88;
      }

      .error-msg {
        margin-top: 1rem;
        color: #ff4d4d;
        font-size: 0.9rem;
        display: none;
      }

      .hidden-content {
        display: none;
        color: #d1f7c4;
        text-align: center;
        margin-top: 2rem;
      }

      .glitch {
        animation: glitch 2s infinite;
      }

      @keyframes glitch {
        0% {
          text-shadow: 1px 1px 0 #00ff88, -1px -1px 0 #000;
        }

        25% {
          text-shadow: 2px 0px 0 #00ff88, -2px 0px 0 #000;
        }

        50% {
          text-shadow: -1px 2px 0 #00ff88, 1px -2px 0 #000;
        }

        75% {
          text-shadow: 2px -2px 0 #00ff88, -2px 2px 0 #000;
        }

        100% {
          text-shadow: 0px 0px 0 #00ff88, 0px 0px 0 #000;
        }
      }

      @keyframes flicker {
        0% {
          opacity: 1;
        }

        50% {
          opacity: 0.95;
        }

        100% {
          opacity: 1;
        }
      }

      .shake {
        animation: shake 0.5s ease-in-out;
      }

      @keyframes shake {
        0% {
          transform: translateX(0);
        }

        25% {
          transform: translateX(-5px);
        }

        50% {
          transform: translateX(5px);
        }

        75% {
          transform: translateX(-5px);
        }

        100% {
          transform: translateX(0);
        }
      }

      .submit-btn {
        animation: breathe 4s ease-in-out infinite, hueShift 10s linear infinite;
      }

      .submit-btn {
        position: relative;
        overflow: hidden;
      }

      .submit-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -75%;
        width: 50%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transform: skewX(-20deg);
        animation: light-sweep 3s linear infinite;
        pointer-events: none;
      }

      @keyframes light-sweep {
        0% {
          left: -75%;
        }

        100% {
          left: 125%;
        }
      }

      .fade-in {
        animation: fadeIn 0.7s ease-in both;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }

        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* text change from denied to granted */
      h2.glitch {
        animation: glitchSwap 0.6s steps(2, end);
        transform: none;
      }

      h2.access-granted {
        color: #0f0;
        text-shadow: 0 0 5px #0f0, 0 0 10px #0f0, 0 0 20px #0f0;
      }

      @keyframes glitchSwap {
        0% {
          transform: skewX(-5deg);
          opacity: 0.7;
        }

        50% {
          transform: skewX(5deg);
          opacity: 0.4;
        }

        100% {
          transform: none;
          opacity: 1;
        }
      }

      h2.access-granted {
        color: #0f0;
        text-shadow: 0 0 5px #0f0, 0 0 10px #0f0, 0 0 20px #0f0, 0 0 40px #0f0;
      }

      /* Original glitchFade for all */
      body.fade-out {
        animation: glitchFade 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      /* WebView uses lighter glitchFade */
      body.webview.fade-out {
        animation: webviewGlitchUpgrade 1.5s ease forwards;
        filter: brightness(1.05) contrast(0.95);
      }

      @media (prefers-reduced-motion: reduce), (max-resolution: 150dpi) {
        body.webview.fade-out {
          animation: none !important;
          opacity: 1 !important;
          filter: none !important;
        }
      }

      /* Optional: tweak keyframes to soften the effect */
      @keyframes webviewGlitchUpgrade {
        0% {
          opacity: 1;
          filter: none;
          transform: translateX(0) skew(0deg);
          text-shadow: none;
        }
        20% {
          opacity: 0.9;
          filter: drop-shadow(2px 0 red);
          transform: translateX(-2px) skew(-2deg);
          text-shadow: 2px 0 red;
        }
        40% {
          opacity: 0.85;
          filter: drop-shadow(-2px 0 cyan);
          transform: translateX(2px) skew(2deg);
          text-shadow: -2px 0 cyan;
        }
        60% {
          opacity: 0.9;
          filter: drop-shadow(1px 0 magenta);
          transform: translateX(-1px) skew(-1deg);
          text-shadow: 1px 0 magenta;
        }
        80% {
          opacity: 0.95;
          filter: none;
          transform: translateX(0) skew(0deg);
          text-shadow: none;
        }
        100% {
          opacity: 0;
          transform: scale(0.95);
        }
      }
    </style>
  </head>

  <body>
    <div class="fade-in">
      <div class="lock-container glitch">
        <h2 id="statusText" class="access-denied">ACCESS DENIED</h2>
        <p>“Swapnil's mind is locked. The key is all you need. Did he give it to you?”</p>
        <form autocomplete="off" onsubmit="submitPassword(); return false;">
          <input
            type="text"
            name="username"
            autocomplete="username"
            tabindex="-1"
            style="position: absolute; left: -9999px"
          />
          <input
            type="password"
            id="passwordInput"
            placeholder="Type the word..."
            maxlength="17"
            autocomplete="off"
          />
          <button type="submit" class="submit-btn">UNLOCK</button>
        </form>
        <div class="error-msg" id="errorMsg"></div>
      </div>
      <div class="button-container">
        <a href="index7.html" class="nav-button">⟵ Previous</a>
      </div>
    </div>

    <script>
      const placeholders = [
        'Type the word...',
        'Pain behind my smile...',
        '<Unlock the secret...>',
        'Unspoken me — waiting...',
        'Not sure? Try typing a hint...',
        'Nothing to hide...',
      ];

      const passwordInput = document.getElementById('passwordInput');
      const errorMsg = document.getElementById('errorMsg');
      let currentIndex = 0;
      let charIndex = 0;
      let isDeleting = false;

      function typePlaceholder() {
        const current = placeholders[currentIndex];
        const visibleText = current.substring(0, charIndex);
        const cursor = '_';
        passwordInput.setAttribute('placeholder', visibleText + cursor);

        if (!isDeleting) {
          if (charIndex < current.length) {
            charIndex++;
            setTimeout(typePlaceholder, 80);
          } else {
            setTimeout(() => {
              isDeleting = true;
              typePlaceholder();
            }, 2000);
          }
        } else {
          if (charIndex > 0) {
            charIndex--;
            setTimeout(typePlaceholder, 30);
          } else {
            isDeleting = false;
            currentIndex = (currentIndex + 1) % placeholders.length;
            setTimeout(typePlaceholder, 300);
          }
        }
      }

      typePlaceholder();

      let deviceFingerprint = localStorage.getItem('deviceFingerprint');
      if (!deviceFingerprint) {
        deviceFingerprint = crypto.randomUUID();
        localStorage.setItem('deviceFingerprint', deviceFingerprint);
      }

      function getSessionId() {
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
          sessionId = `Sess.Unknown.${crypto.randomUUID()}`;
          localStorage.setItem('sessionId', sessionId);
        }
        return sessionId;
      }

      async function submitPassword() {
        const password = passwordInput.value.trim().replace(/\s/g, '');
        const unlockButton = document.querySelector('.submit-btn');
        unlockButton.disabled = true; // Disable button immediately
        unlockButton.classList.add('processing');

        if (!password) {
          const msg = 'Password cannot be empty!';
          errorMsg.style.color = 'red';
          errorMsg.style.display = 'block';

          // Blink text by quick clear/restore
          errorMsg.classList.remove('shake');
          void errorMsg.offsetWidth; // force reflow
          errorMsg.classList.add('shake');

          setTimeout(() => {
            errorMsg.textContent = msg;
          }, 80);
          errorMsg.textContent = '';

          triggerInputError();

          unlockButton.classList.remove('processing');
          unlockButton.disabled = false; // Re-enable before returning
          return;
        }

        const payload = {
          deviceFingerprint: deviceFingerprint,
          sessionId: getSessionId(),
          passwordAttempt: password,
        };

        errorMsg.textContent = 'Checking...';
        errorMsg.style.display = 'block';
        errorMsg.style.color = '#999';

        try {
          const response = await fetch(
            'https://ftlpntiymqcrtcsxfchv.supabase.co/functions/v1/frontend-password-verify',
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(payload),
            }
          );

          if (!response.ok) {
            // If the server replies with error status
            const errorData = await response.json().catch(() => ({}));
            errorMsg.textContent = errorData.message || 'Unknown error occurred';
            errorMsg.style.color = 'red';
            triggerInputError();
            unlockButton.classList.remove('processing');
            unlockButton.disabled = false; // Re-enable before returning
            return;
          }

          const data = await response.json();

          if (data.status === 'master') {
            // Show the master message specially — override errors or success
            errorMsg.textContent = data.message;
            errorMsg.style.color = 'black'; // Master override color — rare and divine
            unlockButton.classList.remove('processing');
            unlockButton.disabled = false; // re-enable submit button
            // You can add any special animation or UI here if you want
          } else if (data.status === 'error') {
            errorMsg.textContent = data.message;
            errorMsg.style.color = 'red';
            triggerInputError();

            if (data.playAudio) {
              let audio;
              if (data.audioUrl) {
                audio = new Audio(data.audioUrl);
                audio.volume = 0.3;
              } else {
                audio = new Audio(
                  'https://ftlpntiymqcrtcsxfchv.supabase.co/storage/v1/object/public/assets/giggle.mp3'
                );
                audio.volume = 1;
              }
              audio.play().catch(() => {
                console.warn('Audio play blocked by browser policy.');
              });
            }
            unlockButton.classList.remove('processing');
            unlockButton.disabled = false; // Re-enable before returning
          } else if (data.status === 'success') {
            if (data.message === '✌️ Maybe just ask him? ✅') {
              errorMsg.textContent = data.message;
              errorMsg.style.color = 'blue';
              unlockButton.classList.remove('processing');
              unlockButton.disabled = false; // Re-enable before returning
            } else if (data.signedUrl) {
              errorMsg.textContent =
                data.message || '🔓 Root access granted. You’re now the system.';
              errorMsg.style.color = 'green';
              const h2 = document.querySelector('h2');

              if (h2) {
                h2.textContent = 'ACCESS GRANTED';
                h2.classList.remove('access-denied');
                h2.classList.add('glitch');

                setTimeout(() => {
                  h2.classList.remove('glitch');
                  h2.classList.add('access-granted');

                  document.body.classList.add('fade-out');
                  setTimeout(() => {
                    window.location.href = data.signedUrl;
                  }, 1500);
                }, 600);
              }
            }
          } else {
            errorMsg.textContent = 'Unexpected response. Try again.';
            errorMsg.style.color = 'orange';
            unlockButton.classList.remove('processing');
            unlockButton.disabled = false; // Re-enable before returning
          }

          passwordInput.value = '';
        } catch (error) {
          console.error('Request error:', error);
          errorMsg.textContent = 'Your Internet is toast or server’s napping. Fix it, human';
          errorMsg.style.color = 'orange';
          setTimeout(() => {
            errorMsg.style.display = 'none';
          }, 7000);
          unlockButton.classList.remove('processing');
          unlockButton.disabled = false; // Re-enable before returning
        }
      }

      function triggerInputError() {
        passwordInput.classList.add('error');
        passwordInput.classList.add('shake');
        setTimeout(() => {
          passwordInput.classList.remove('error');
          passwordInput.classList.remove('shake');
        }, 500);
      }

      // Handles keyboard input and blocks space/Enter behavior
      passwordInput.addEventListener('keydown', function (event) {
        const unlockButton = document.querySelector('.submit-btn');

        // Block spacebar on physical keyboards
        if (event.key === ' ' || event.code === 'Space') {
          event.preventDefault();
        } else if (event.key === 'Enter') {
          event.preventDefault();
          if (!unlockButton.disabled) {
            submitPassword();
          }
        }
      });

      // Handles mobile keyboards where keydown doesn't always fire
      passwordInput.addEventListener('input', function () {
        const sanitized = passwordInput.value.replace(/\s/g, '');
        if (passwordInput.value !== sanitized) {
          passwordInput.value = sanitized;
        }
      });
    </script>
  </body>
</html>
