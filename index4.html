<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.: Access The Mind :.</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #7aff9b;
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;
    }

    .lock-container {
      background: #0a0a0a;
      border: 1px solid #004422;
      padding: 2.5rem;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(0, 255, 100, 0.05);
      text-align: center;
      width: 100%;
      max-width: 400px;
      animation: flicker 1.5s infinite alternate;
    }

    h2 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
      color: #4aff80;
      letter-spacing: 2px;
    }

    p {
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      color: #3aff70;
    }

    input[type="password"] {
      background: transparent;
      border: 1px solid #3aff70;
      padding: 0.75rem;
      width: 100%;
      color: #00ff99;
      text-align: center;
      font-size: 1rem;
      border-radius: 4px;
      outline: none;
      caret-color: #00ff99;
    }

    .submit-btn {
      margin-top: 1.5rem;
      padding: 0.5rem 2rem;
      font-size: 1rem;
      background: transparent;
      border: 1px solid #00ff88;
      color: #00ff88;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 0 5px #00ff88;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      background-color: #00ff88;
      color: #000;
      box-shadow: 0 0 15px #00ff88;
    }

    .error-msg {
      margin-top: 1rem;
      color: #ff4d4d;
      font-size: 0.9rem;
      display: none;
    }

    .hidden-content {
      display: none;
      color: #d1f7c4;
      text-align: center;
      margin-top: 2rem;
    }

    .glitch {
      animation: glitch 2s infinite;
    }

    @keyframes glitch {
      0% {
        text-shadow: 1px 1px 0 #00ff88, -1px -1px 0 #000;
      }
      25% {
        text-shadow: 2px 0px 0 #00ff88, -2px 0px 0 #000;
      }
      50% {
        text-shadow: -1px 2px 0 #00ff88, 1px -2px 0 #000;
      }
      75% {
        text-shadow: 2px -2px 0 #00ff88, -2px 2px 0 #000;
      }
      100% {
        text-shadow: 0px 0px 0 #00ff88, 0px 0px 0 #000;
      }
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.95; }
      100% { opacity: 1; }
    }

    .shake {
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="lock-container glitch">
    <h2>ACCESS DENIED</h2>
    <p>“Swapnil's mind is locked. The key is all you need. Did he give it to you?”</p>
    <input type="password" id="passwordInput" placeholder="Type the word..." maxlength="17" />
    <button class="submit-btn" onclick="submitPassword()">UNLOCK</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
  <div class="button-container">
    <a href="index3.html" class="nav-button">⟵ Previous</a>
  </div>

  <script>
    const placeholders = [
      "Type the word...",
      "Pain behind my smile...",
      "<Unlock the secret...>",
      "Unspoken me — waiting...",
      "Not sure? Try typing a hint...",
      "Nothing to hide..."
    ];
  
    const passwordInput = document.getElementById("passwordInput");
    let currentIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
  
    function typePlaceholder() {
      const current = placeholders[currentIndex];
      const visibleText = current.substring(0, charIndex);
      const cursor = "_";
      passwordInput.setAttribute("placeholder", visibleText + cursor);
  
      if (!isDeleting) {
        if (charIndex < current.length) {
          charIndex++;
          setTimeout(typePlaceholder, 80);
        } else {
          setTimeout(() => {
            isDeleting = true;
            typePlaceholder();
          }, 2000);
        }
      } else {
        if (charIndex > 0) {
          charIndex--;
          setTimeout(typePlaceholder, 30);
        } else {
          isDeleting = false;
          currentIndex = (currentIndex + 1) % placeholders.length;
          setTimeout(typePlaceholder, 300);
        }
      }
    }
  
    typePlaceholder();
  
    // Generate and store a device fingerprint if not already present
    let deviceFingerprint = localStorage.getItem("deviceFingerprint");
    if (!deviceFingerprint) {
      deviceFingerprint = crypto.randomUUID();
      localStorage.setItem("deviceFingerprint", deviceFingerprint);
    }
  
    function getSessionId() {
      let sessionId = localStorage.getItem("sessionId");
      if (!sessionId) {
        sessionId = `Sess.Unknown.${crypto.randomUUID()}`;
        localStorage.setItem("sessionId", sessionId);
      }
      return sessionId;
    }
  
    async function submitPassword() {
      const errorMsg = document.getElementById("errorMsg");
      const password = passwordInput.value;
  
      const payload = {
        deviceFingerprint: deviceFingerprint,
        sessionId: getSessionId(),
        passwordAttempt: password
      };
  
      errorMsg.textContent = "Checking...";
      errorMsg.style.display = "block";
      errorMsg.style.color = "#999";
  
      try {
        const response = await fetch("https://ftlpntiymqcrtcsxfchv.supabase.co/functions/v1/check-status", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0bHBudGl5bXFjcnRjc3hmY2h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUyNjUyNDAsImV4cCI6MjA2MDg0MTI0MH0.Kv5AC0h2mSaZZtlukWDcXsAkZj8lkRS8_3ZXRewZZ28`
          },
          body: JSON.stringify(payload)
        });
  
        const data = await response.json();
  
        if (data.status === "error") {
          errorMsg.textContent = data.message;
          errorMsg.style.color = "red";
          passwordInput.classList.add("shake");
          setTimeout(() => passwordInput.classList.remove("shake"), 500);
        } else if (data.status === "success") {
          if (data.message === "✌️ Maybe just ask him? ✅") {
            errorMsg.textContent = data.message;
            errorMsg.style.color = "blue";
          } else if (data.signedUrl) {
            errorMsg.textContent = "✅ Success! Redirecting...";
            errorMsg.style.color = "green";
            setTimeout(() => {
              window.location.href = data.signedUrl;
            }, 1000);
          } else {
            errorMsg.textContent = "Unexpected response. Try again.";
            errorMsg.style.color = "orange";
          }
        } else {
          errorMsg.textContent = "Unexpected response. Try again.";
          errorMsg.style.color = "orange";
        }
  
        passwordInput.value = "";
  
      } catch (error) {
        console.error("Request error:", error);
        errorMsg.textContent = "You need an active internet connection to verify password";
        errorMsg.style.color = "orange";
        setTimeout(() => {
          errorMsg.style.display = "none";
        }, 4000);
      }
    }
  
    passwordInput.addEventListener("keydown", function (event) {
      if (event.key === " " || event.code === "Space") {
        event.preventDefault();
      } else if (event.key === "Enter") {
        event.preventDefault();
        submitPassword();
      }
    });
  
    passwordInput.addEventListener("input", function () {
      this.value = this.value.replace(/\s/g, '');
    });
  </script>
  
</body>
</html>
