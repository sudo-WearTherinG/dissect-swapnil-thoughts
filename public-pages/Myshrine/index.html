<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Shrine</title>
    <link rel="stylesheet" href="./assets/css/tailwind.min.css" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex, nofollow" />

    <!-- Load CSS & JS from local files. -->
    <script src="../assets/js/script-index.js" defer></script>
    <!-- End Of CSS and JS loading. -->

    <style>
      body {
        background-color: #0d0d0d;
        color: #f2f2f2;
        font-family: "Courier New", monospace;
        overflow: hidden;
      }
      .glitch-text {
        position: relative;
        font-size: 2rem;
        color: white;
        animation: glitch 1.5s infinite;
      }
      @keyframes glitch {
        0% {
          text-shadow: 2px 2px red;
        }
        25% {
          text-shadow: -2px -2px cyan;
        }
        50% {
          text-shadow: 2px -2px lime;
        }
        75% {
          text-shadow: -2px 2px magenta;
        }
        100% {
          text-shadow: 2px 2px red;
        }
      }
      .blood-drip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        width: 4px;
        height: 30px;
        background: red;
        animation: drip 2s infinite;
      }
      @keyframes drip {
        0% {
          height: 0;
          opacity: 0;
        }
        30% {
          height: 30px;
          opacity: 1;
        }
        100% {
          height: 0;
          opacity: 0;
        }
      }
      .carousel {
        position: relative;
        width: 300px;
        height: 300px;
        overflow: hidden;
        border-radius: 9999px;
        margin: 0 auto 1.5rem;
      }
      .carousel img {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background-color: #111;
        border-radius: 9999px;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }
      .carousel img.active {
        opacity: 1;
      }

      /* Text selection */
      ::selection {
        background: linear-gradient(
          90deg,
          rgba(0, 255, 204, 0.5),
          rgba(0, 255, 170, 0.4)
        );
        color: #00ffcc;
        text-shadow: 0 0 4px #00ffcc;
      }

      ::-moz-selection {
        background: linear-gradient(
          90deg,
          rgba(0, 255, 204, 0.5),
          rgba(0, 255, 170, 0.4)
        );
        color: #00ffcc;
        text-shadow: 0 0 4px #00ffcc;
      }

      @media (max-width: 480px) {
        .carousel {
          width: 180px;
          height: 180px;
        }
        .glitch-text {
          font-size: 1.2rem;
        }
        .text-sm {
          font-size: 0.75rem;
        }
        body {
          padding: 1rem;
        }
      }
    </style>
  </head>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const images = document.querySelectorAll(".carousel img");
        let current = 0;

        if (images.length === 0) return; // fail-safe if no images found

        setInterval(() => {
          images[current].classList.remove("active");
          current = (current + 1) % images.length;
          images[current].classList.add("active");
        }, 4000);

        setTimeout(() => {
          document.body.classList.add("fade-to-black");
        }, 32000);
      });
    </script>

    <style>
      .fade-to-black {
        animation: fadeout 2s forwards;
      }
      @keyframes fadeout {
        to {
          opacity: 0;
          background: black;
        }
      }
