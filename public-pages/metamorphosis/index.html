<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Metamorphosis — Dissect Swapnil Thoughts</title>
    <meta
      name="description"
      content="Five chapters. One arc. On becoming, translation, performance, loneliness, and the things silence reveals."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Courier+Prime:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: oklch(10% 0.008 260);
        --text-primary: oklch(78% 0.01 260);
        --text-secondary: oklch(52% 0.01 260);
        --text-dim: oklch(38% 0.01 260);
        --accent: oklch(62% 0.04 180);
        --rule: oklch(22% 0.009 260);
        --font-body: 'EB Garamond', Georgia, serif;
        --font-mono: 'Courier Prime', 'Courier New', monospace;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text-primary);
        font-family: var(--font-body);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
        text-align: center;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 999;
        opacity: 0.4;
      }

      .label {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 3rem;
        opacity: 0;
        animation: rise 1s ease forwards 0.3s;
      }

      h1 {
        font-size: clamp(3.5rem, 10vw, 6.5rem);
        font-weight: 400;
        font-style: italic;
        letter-spacing: -0.02em;
        line-height: 1.05;
        color: var(--text-primary);
        margin-bottom: 1.5rem;
        opacity: 0;
        animation: rise 1s ease forwards 0.6s;
      }

      .subtitle {
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: var(--text-dim);
        letter-spacing: 0.12em;
        margin-bottom: 5rem;
        opacity: 0;
        animation: rise 1s ease forwards 0.9s;
      }

      nav {
        display: flex;
        flex-direction: column;
        gap: 0;
        width: 100%;
        max-width: 420px;
        opacity: 0;
        animation: rise 1s ease forwards 1.2s;
      }

      nav a {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        padding: 1.1rem 0;
        border-top: 1px solid var(--rule);
        text-decoration: none;
        color: var(--text-secondary);
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: color 0.25s ease;
        text-align: left;
      }

      nav a:last-child {
        border-bottom: 1px solid var(--rule);
      }

      nav a:hover {
        color: var(--accent);
      }

      nav a .num {
        color: var(--accent);
        min-width: 1.5rem;
      }

      .begin {
        margin-top: 4rem;
        opacity: 0;
        animation: rise 1s ease forwards 1.5s;
        user-select: none;
      }

      .begin a {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-primary);
        text-decoration: none;
        padding: 1rem 2.5rem;
        border: 1px solid var(--rule);
        transition:
          border-color 0.3s ease,
          color 0.3s ease;
        display: inline-block;
        animation: breathe 4s ease-in-out infinite;
      }

      .begin a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      @keyframes breathe {
        0%,
        100% {
          box-shadow: 0 0 0px transparent;
        }
        50% {
          box-shadow: 0 0 12px oklch(62% 0.04 180 / 0.15);
        }
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      ::selection {
        background: var(--accent);
        color: var(--bg);
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 3rem;
        }
        body {
          padding: 3rem 1.5rem;
        }
      }
    </style>
    <script src="assets/js/script-index.js" defer></script>
  </head>
  <body>
    <div class="label">Dissect Swapnil Thoughts</div>
    <h1>Metamorphosis</h1>
    <p class="subtitle">
      Five chapters &nbsp;&mdash;&nbsp; One arc &nbsp;&mdash;&nbsp; A return
    </p>

    <nav>
      <a href="chapter1.html">
        <span class="num">I</span>
        The Wrong Shape
      </a>
      <a href="chapter2.html">
        <span class="num">II</span>
        The Shape of Silence
      </a>
      <a href="chapter3.html">
        <span class="num">III</span>
        Role Required Belief
      </a>
      <a href="chapter4.html">
        <span class="num">IV</span>
        He Was A Human
      </a>
      <a href="chapter5.html">
        <span class="num">V</span>
        Silence Was The Loudest Response
      </a>
    </nav>

    <div class="begin">
      <a href="chapter1.html">Begin &rarr;</a>
    </div>
  </body>
</html>
